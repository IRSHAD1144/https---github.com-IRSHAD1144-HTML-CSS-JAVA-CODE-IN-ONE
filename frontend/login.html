<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Code One</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-block-size: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background circles */
        body::before {
            content: '';
            position: absolute;
            inline-size: 300px;
            block-size: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            inset-block-start: -150px;
            inset-inline-end: -150px;
            animation: float 20s infinite;
        }

        body::after {
            content: '';
            position: absolute;
            inline-size: 200px;
            block-size: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            inset-block-end: -100px;
            inset-inline-start: -100px;
            animation: float 15s infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .login-container {
            inline-size: 100%;
            max-inline-size: 450px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #f87171, #34d399, #facc15);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            inset-block-start: -50%;
            inset-inline-start: -50%;
            inline-size: 200%;
            block-size: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shine 8s infinite;
        }

        @keyframes shine {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }

        .logo {
            inline-size: 80px;
            block-size: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            margin-block-end: 8px;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255,255,255,0.95);
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        /* Form Section */
        .form-container {
            padding: 40px;
        }

        .input-group {
            margin-block-end: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-block-end: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            inline-size: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #34d399;
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.1);
        }

        .input-group .icon {
            position: absolute;
            inset-inline-start: 15px;
            inset-block-end: 14px;
            color: #9ca3af;
            font-size: 18px;
        }

        /* Remember me and Forgot password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-block-end: 25px;
            font-size: 14px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox input {
            inline-size: 16px;
            block-size: 16px;
            cursor: pointer;
        }

        .forgot-link {
            color: #f87171;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #34d399;
            text-decoration: underline;
        }

        /* Login Button */
        .btn-login {
            inline-size: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f87171, #34d399);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset-block-start: 50%;
            inset-inline-start: 50%;
            inline-size: 0;
            block-size: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover::before {
            inline-size: 300px;
            block-size: 300px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Signup Link */
        .signup-section {
            text-align: center;
            margin-block-start: 25px;
            padding-block-start: 20px;
            border-block-start: 1px solid #e5e7eb;
        }

        .signup-section p {
            color: #6b7280;
            font-size: 14px;
        }

        .signup-section a {
            color: #f87171;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .signup-section a:hover {
            color: #34d399;
            text-decoration: underline;
        }

        /* Message Alerts */
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-block-end: 20px;
            display: none;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            border-inline-start: 4px solid #dc2626;
        }

        .success {
            background: #d1fae5;
            color: #059669;
            border-inline-start: 4px solid #059669;
        }

        .info {
            background: #dbeafe;
            color: #2563eb;
            border-inline-start: 4px solid #2563eb;
        }

        .loading {
            display: none;
            text-align: center;
            margin-block-start: 15px;
            color: #34d399;
            font-size: 14px;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Social Login */
        .social-login {
            margin-block-start: 25px;
            text-align: center;
        }

        .social-login p {
            color: #9ca3af;
            font-size: 12px;
            margin-block-end: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            inset-block-start: 50%;
            inline-size: 30%;
            block-size: 1px;
            background: #e5e7eb;
        }

        .social-login p::before {
            inset-inline-start: 0;
        }

        .social-login p::after {
            inset-inline-end: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            inline-size: 40px;
            block-size: 40px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            background: #34d399;
            color: white;
        }

        /* Responsive */
        @media (max-inline-size: 480px) {
            .form-container {
                padding: 30px 25px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <div class="logo">
                    🚀
                </div>
                <h1>Welcome Back!</h1>
                <p>Login to continue your coding journey</p>
            </div>
            
            <div class="form-container">
                <div id="message" class="message"></div>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email Address</label>
                        <span class="icon">📧</span>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            placeholder="Enter your email"
                            autocomplete="email"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <span class="icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            required 
                            placeholder="Enter your password"
                            autocomplete="current-password"
                        >
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn-login" id="loginBtn">
                        Login
                    </button>
                    
                    <div id="loading" class="loading">
                        Logging in
                    </div>
                </form>
                
                <div class="signup-section">
                    <p>Don't have an account? <a href="signup.html">Create Account</a></p>
                </div>
                
                <div class="social-login">
                    <p>Or login with</p>
                    <div class="social-icons">
                        <a href="#" class="social-icon" onclick="socialLogin('google')">G</a>
                        <a href="#" class="social-icon" onclick="socialLogin('github')">GH</a>
                        <a href="#" class="social-icon" onclick="socialLogin('linkedin')">in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API URL - change this to your backend URL
        const API_URL = 'http://localhost:5000/api/auth';

        // Get DOM elements
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loadingDiv = document.getElementById('loading');
        const messageDiv = document.getElementById('message');
        const rememberMeCheckbox = document.getElementById('rememberMe');

        // Load saved email if "Remember Me" was checked
        window.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('savedEmail');
            const savedRemember = localStorage.getItem('rememberMe');
            
            if (savedRemember === 'true' && savedEmail) {
                emailInput.value = savedEmail;
                rememberMeCheckbox.checked = true;
            }
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Validation
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            // Disable button and show loading
            loginBtn.disabled = true;
            loadingDiv.style.display = 'block';
            hideMessage();
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Handle "Remember Me"
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem('savedEmail', email);
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        localStorage.removeItem('savedEmail');
                        localStorage.setItem('rememberMe', 'false');
                    }
                    
                    // Store token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showMessage('Login successful! Redirecting...', 'success');
                    
                    // Redirect to dashboard after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Login failed. Please try again.', 'error');
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Cannot connect to server. ';
                if (error.message.includes('Failed to fetch')) {
                    errorMessage += 'Make sure the backend server is running on port 5000.';
                } else {
                    errorMessage += 'Please try again later.';
                }
                
                showMessage(errorMessage, 'error');
                loginBtn.disabled = false;
            } finally {
                loadingDiv.style.display = 'none';
            }
        });
        
        // Helper function to validate email
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        // Helper function to show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Auto hide after 5 seconds for success messages
            if (type === 'success') {
                setTimeout(() => {
                    if (messageDiv.style.display === 'block') {
                        hideMessage();
                    }
                }, 5000);
            }
        }
        
        // Helper function to hide message
        function hideMessage() {
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }
        
        // Forgot password handler
        function forgotPassword(event) {
            event.preventDefault();
            const email = emailInput.value.trim();
            
            if (email && isValidEmail(email)) {
                showMessage(`Password reset link sent to ${email}`, 'info');
            } else {
                showMessage('Please enter your email address to reset password', 'info');
                emailInput.focus();
            }
        }
        
        // Social login (demo)
        function socialLogin(provider) {
            showMessage(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon!`, 'info');
        }
        
        // Add enter key support
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        // Real-time validation
        emailInput.addEventListener('input', () => {
            if (emailInput.value.trim() && !isValidEmail(emailInput.value.trim())) {
                emailInput.style.borderColor = '#f87171';
            } else {
                emailInput.style.borderColor = '#e5e7eb';
            }
        });
    </script>
</body>
</html>
